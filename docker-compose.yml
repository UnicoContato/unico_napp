version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: integrador
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/integrador
      ADMIN_API_KEY: my_secure_admin_key_12345
    ports:
      - "5000:5000"

volumes:
  postgres_data: